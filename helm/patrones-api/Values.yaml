
replicaCount: 4

image:
  repository: krlitos/actividad3-gutierrez
  tag: "5b08beb"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: 256Mi
    cpu: 300m
  limits:
    memory: 512Mi
    cpu: 600m

livenessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /actuator/health
    port: 8080
  initialDelaySeconds: 20
  periodSeconds: 10

redis:
  image: redis:7-alpine
  port: 6379
  storage: 500Mi